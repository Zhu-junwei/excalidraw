name: Auto Sync Fork

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect upstream and its default branch
        id: upstream
        run: |
          UPSTREAM_URL=$(gh api repos/${{ github.repository }} --jq '.parent.clone_url')
          UPSTREAM_DEFAULT_BRANCH=$(gh api repos/${{ github.repository }} --jq '.parent.default_branch')

          if [ -z "$UPSTREAM_URL" ]; then
            echo "This repo does not have an upstream (it may not be a fork)."
            exit 1
          fi

          echo "Detected upstream: $UPSTREAM_URL"
          echo "Upstream default branch: $UPSTREAM_DEFAULT_BRANCH"

          echo "UPSTREAM_URL=$UPSTREAM_URL" >> $GITHUB_ENV
          echo "UPSTREAM_BRANCH=$UPSTREAM_DEFAULT_BRANCH" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream
        run: |
          git remote add upstream "$UPSTREAM_URL" || true
          git fetch upstream

      - name: Check for changes in upstream (ignoring sync.yml)
        id: check_changes
        run: |
          git fetch upstream
          UPSTREAM_DIFF=$(git diff --name-only upstream/${UPSTREAM_BRANCH}..HEAD | grep -v '.github/workflows/sync.yml' || true)
          echo "Upstream changes (excluding sync.yml): $UPSTREAM_DIFF"

          if [ -z "$UPSTREAM_DIFF" ]; then
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: Reset fork to upstream (exclude workflow)
        if: env.has_changes == 'true'
        run: |
          cp -r .github/workflows/sync.yml ../sync.yml.bak
          git reset --hard upstream/${UPSTREAM_BRANCH}
          mkdir -p .github/workflows
          mv ../sync.yml.bak .github/workflows/sync.yml
          git add .github/workflows/sync.yml
          git commit -m "ci: restore workflow" || echo "No changes to commit"

      - name: Push changes
        if: env.has_changes == 'true'
        run: |
          git push https://${{ secrets.ACTION_PAT }}@github.com/${{ github.repository }}.git main --force     
